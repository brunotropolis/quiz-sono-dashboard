<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Quiz Sono do Bebe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f1923;
    color: #e0e6ed;
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 30px;
    padding: 20px;
  }
  .header h1 {
    font-size: 1.8rem;
    color: #fff;
    margin-bottom: 5px;
  }
  .header p {
    color: #8899aa;
    font-size: 0.9rem;
  }
  .loading {
    text-align: center;
    padding: 60px;
    color: #8899aa;
    font-size: 1.1rem;
  }
  .loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid #1e3a5f;
    border-top-color: #4dabf7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 15px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card {
    background: #172a3a;
    border-radius: 12px;
    padding: 24px;
    border: 1px solid #1e3a5f;
  }
  .card h2 {
    font-size: 1rem;
    color: #8899aa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card h2 .badge {
    background: #1e3a5f;
    color: #4dabf7;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
  }
  .big-number {
    font-size: 3rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    margin-bottom: 4px;
  }
  .big-label {
    color: #5a7a94;
    font-size: 0.85rem;
  }

  .stats-row {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-box {
    flex: 1;
    min-width: 120px;
    background: #0f1923;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-box .num {
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
  }
  .stat-box .label {
    color: #5a7a94;
    font-size: 0.75rem;
    margin-top: 2px;
  }

  .profile-list {
    list-style: none;
  }
  .profile-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #1e3a5f22;
  }
  .profile-item:last-child { border-bottom: none; }
  .profile-name {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
  }
  .profile-emoji { font-size: 1.4rem; }
  .profile-count {
    font-weight: 700;
    font-size: 1.1rem;
    color: #4dabf7;
  }
  .profile-bar-container {
    flex: 1;
    margin: 0 15px;
    background: #0f1923;
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .profile-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .bar-coruja { background: #f59f00; }
  .bar-leao { background: #ff6b6b; }
  .bar-suricato { background: #51cf66; }
  .bar-canguru { background: #cc5de8; }
  .bar-coala { background: #4dabf7; }

  .clicks-section { margin-top: 16px; }
  .clicks-section h3 {
    font-size: 0.85rem;
    color: #5a7a94;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .click-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.9rem;
  }
  .click-row .val {
    color: #25d366;
    font-weight: 600;
  }

  .funnel-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid #1e3a5f; }
  .funnel-section h3 {
    font-size: 0.85rem;
    color: #5a7a94;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .funnel-step {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    margin-bottom: 4px;
    background: #0f1923;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }
  .funnel-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, #1e3a5f 0%, #264a6f 100%);
    border-radius: 6px;
    transition: width 0.6s ease;
    z-index: 0;
  }
  .funnel-label, .funnel-value {
    position: relative;
    z-index: 1;
  }
  .funnel-label {
    font-size: 0.88rem;
    color: #e0e6ed;
    font-weight: 500;
  }
  .funnel-value {
    font-weight: 700;
    color: #fff;
  }
  .funnel-value .pct {
    color: #4dabf7;
    font-size: 0.8rem;
    margin-left: 8px;
  }
  .funnel-drop {
    color: #ff6b6b;
    font-size: 0.75rem;
    padding: 2px 12px 6px;
  }

  .section-title {
    grid-column: 1 / -1;
    font-size: 1.2rem;
    color: #fff;
    padding: 15px 0 0;
    border-top: 1px solid #1e3a5f;
    margin-top: 10px;
  }

  .refresh-btn {
    display: inline-block;
    background: #1e3a5f;
    color: #4dabf7;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    margin-top: 8px;
  }
  .refresh-btn:hover { background: #264a6f; }

  .error-msg {
    text-align: center;
    padding: 40px;
    color: #ff6b6b;
  }

  .total-row {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }
  .total-card {
    background: #172a3a;
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 20px 30px;
    text-align: center;
    min-width: 160px;
  }
  .total-card .num {
    font-size: 2.5rem;
    font-weight: 700;
    color: #4dabf7;
  }
  .total-card .label {
    color: #5a7a94;
    font-size: 0.8rem;
    margin-top: 4px;
  }

  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
    .stats-row { gap: 10px; }
    .big-number { font-size: 2.2rem; }
    body { padding: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Dashboard Quiz Sono do Bebe</h1>
  <p>Metricas em tempo real dos quizzes</p>
  <button class="refresh-btn" onclick="loadData()">Atualizar dados</button>
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  Carregando dados...
</div>

<div id="error" class="error-msg" style="display:none;">
  Erro ao carregar dados. Verifique a URL do Apps Script.
</div>

<div id="content" style="display:none;">
  <div class="total-row" id="totals"></div>
  <div class="grid" id="cards"></div>
</div>

<script>
const TRACKING_URL = 'https://script.google.com/macros/s/AKfycbzh-GOfXA6A8tYKfn7U8fK4MXYI40M5CKMyTPergH9EqvjYGF2j5LbFQE68LhMKsQFm/exec';

const ANIMAL_MAP = {
  'Coruja': { emoji: '\ud83e\udd89', color: 'coruja' },
  'Le\u00e3o':   { emoji: '\ud83e\udd81', color: 'leao' },
  'Suricato': { emoji: '\ud83d\udc3e', color: 'suricato' },
  'Canguru': { emoji: '\ud83e\udd98', color: 'canguru' },
  'Coala':   { emoji: '\ud83d\udc28', color: 'coala' }
};

const QUIZ_LABELS = {
  'aluna': { name: 'Aluna', desc: 'quiz.manualdorecemnascido.com.br' },
  'convite': { name: 'Convite', desc: 'convitequiz.manualdorecemnascido.com.br' },
  'quizclube': { name: 'Quiz Clube', desc: 'quizclube.manualdorecemnascido.com.br' }
};

const PROFILE_ORDER = ['Coruja', 'Le\u00e3o', 'Suricato', 'Canguru', 'Coala'];

function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  document.getElementById('error').style.display = 'none';

  fetch(TRACKING_URL)
    .then(r => r.json())
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      renderDashboard(data.stats);
    })
    .catch(err => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      console.error(err);
    });
}

function renderDashboard(stats) {
  const totalsEl = document.getElementById('totals');
  const cardsEl = document.getElementById('cards');

  let grandTotal = 0;
  let grandClicks = 0;
  let grandStarted = 0;
  // Conclusao geral: soma APENAS dos quizzes com tracking de start (para evitar razao distorcida)
  let trackedStarted = 0;
  let trackedCompleted = 0;
  Object.values(stats).forEach(s => {
    grandTotal += s.total;
    grandClicks += s.total_clicks || 0;
    grandStarted += s.started || 0;
    if ((s.started || 0) > 0) {
      trackedStarted += s.started;
      trackedCompleted += s.total;
    }
  });

  totalsEl.innerHTML = `
    <div class="total-card">
      <div class="num">${grandStarted}</div>
      <div class="label">Iniciaram o quiz</div>
    </div>
    <div class="total-card">
      <div class="num">${grandTotal}</div>
      <div class="label">Finalizaram</div>
    </div>
    <div class="total-card">
      <div class="num">${grandClicks}</div>
      <div class="label">Clicaram no botao</div>
    </div>
    <div class="total-card">
      <div class="num">${trackedStarted > 0 ? ((trackedCompleted / trackedStarted) * 100).toFixed(1) + '%' : '-'}</div>
      <div class="label">Conclusao (quizzes com tracking)</div>
    </div>
  `;

  let cardsHTML = '';

  ['aluna', 'convite', 'quizclube'].forEach(version => {
    const s = stats[version];
    const info = QUIZ_LABELS[version];
    const maxCount = Math.max(...PROFILE_ORDER.map(p => s.profiles[p] || 0), 1);

    let profilesHTML = '';
    PROFILE_ORDER.forEach(animal => {
      const count = s.profiles[animal] || 0;
      const pct = maxCount > 0 ? (count / maxCount) * 100 : 0;
      const a = ANIMAL_MAP[animal];
      profilesHTML += `
        <li class="profile-item">
          <span class="profile-name">
            <span class="profile-emoji">${a.emoji}</span>
            ${animal}
          </span>
          <div class="profile-bar-container">
            <div class="profile-bar bar-${a.color}" style="width: ${pct}%"></div>
          </div>
          <span class="profile-count">${count}</span>
        </li>
      `;
    });

    let clicksHTML = '';
    if (version === 'convite' && s.total_clicks > 0) {
      clicksHTML = '<div class="clicks-section"><h3>Cliques por perfil</h3>';
      PROFILE_ORDER.forEach(animal => {
        const clicks = s.clicks[animal] || 0;
        if (clicks > 0) {
          clicksHTML += `
            <div class="click-row">
              <span>${ANIMAL_MAP[animal].emoji} ${animal}</span>
              <span class="val">${clicks} cliques</span>
            </div>
          `;
        }
      });
      clicksHTML += '</div>';
    }

    // Funil (só convite por enquanto, outros mostram s.started=0)
    let funnelHTML = '';
    const q = s.questions || { q1: 0, q2: 0, q3: 0, q4: 0, q5: 0 };
    const started = s.started || 0;
    if (started > 0 || s.total > 0) {
      const steps = [
        { label: 'Iniciou o quiz', count: started },
        { label: 'Respondeu Q1', count: q.q1 },
        { label: 'Respondeu Q2', count: q.q2 },
        { label: 'Respondeu Q3 (metade)', count: q.q3 },
        { label: 'Respondeu Q4', count: q.q4 },
        { label: 'Respondeu Q5 / Finalizou', count: s.total },
        { label: 'Clicou no botao', count: s.total_clicks || 0 }
      ];
      const topCount = Math.max(...steps.map(st => st.count), 1);
      funnelHTML = '<div class="funnel-section"><h3>Funil de respostas</h3>';
      steps.forEach((st, i) => {
        const pctTopo = started > 0 ? ((st.count / started) * 100).toFixed(1) : '-';
        const barW = (st.count / topCount) * 100;
        funnelHTML += `
          <div class="funnel-step">
            <div class="funnel-bar" style="width:${barW}%"></div>
            <span class="funnel-label">${st.label}</span>
            <span class="funnel-value">${st.count}<span class="pct">${started > 0 ? pctTopo + '%' : ''}</span></span>
          </div>
        `;
        if (i < steps.length - 1) {
          const drop = steps[i].count - steps[i + 1].count;
          if (drop > 0 && steps[i].count > 0) {
            const dropPct = ((drop / steps[i].count) * 100).toFixed(1);
            funnelHTML += `<div class="funnel-drop">↓ -${drop} (${dropPct}% saiu aqui)</div>`;
          }
        }
      });
      funnelHTML += '</div>';
    }

    cardsHTML += `
      <div class="card">
        <h2>${info.name} <span class="badge">${info.desc}</span></h2>
        <div class="stats-row">
          <div class="stat-box">
            <div class="num">${s.started || 0}</div>
            <div class="label">Iniciou</div>
          </div>
          <div class="stat-box">
            <div class="num">${s.total}</div>
            <div class="label">Finalizou</div>
          </div>
          ${version === 'convite' ? `
          <div class="stat-box">
            <div class="num">${s.total_clicks || 0}</div>
            <div class="label">Clicou</div>
          </div>
          <div class="stat-box">
            <div class="num">${s.total > 0 ? ((s.total_clicks / s.total) * 100).toFixed(1) + '%' : '0%'}</div>
            <div class="label">CTR</div>
          </div>
          ` : ''}
        </div>
        ${funnelHTML}
        <ul class="profile-list" style="margin-top:20px;">${profilesHTML}</ul>
        ${clicksHTML}
      </div>
    `;
  });

  cardsEl.innerHTML = cardsHTML;
}

loadData();
</script>
</body>
</html>
